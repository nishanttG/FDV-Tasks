version: "3.8"
services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: week5-api:py3.10
    command: uvicorn api:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./:/app

  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: week5-web:py3.10
    command: streamlit run app.py --server.port 8501 --server.headless true
    ports:
      - "8501:8501"
    env_file:
      - .env
    volumes:
      - ./:/app
